<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
    </style>
</head>
<body>
    <h1>we can flip the colors!</h1>

    <button onClick="setColor('Papayawhip')">Papaya-Whip</button>
    <button onClick="setColor('Peachpuff')">Peach Puff</button>
    <button onClick="setColor('Powderblue')">Powder Blue</button>
    <br><br>

    <button onclick="randomColor()"> Random</button>

    <script>
        const body = document.getElementsByTagName("body")[0];
        //body.style.backgroundColor = "papayawhip";

        setColor("white")

        function setColor(name){
            body.style.backgroundColor = name;
        }

        function randomColor(){
            console.log("hi");
            let R= Math.round( Math.random () * 255);
            let V= Math.round(Math.random () * 255);
            let B= Math.round(Math.random () * 255);

            let theColor ="rgb( "+R+","+V+","+B+" )";
            body.style.backgroundColor = theColor;
        }

    </script>
</body>
</html>
